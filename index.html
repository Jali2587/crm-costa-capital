<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costa Capital — Deal Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F6F1; color: #1A1A1A; font-size: 14px; }
  :root { --gold: #C9A84C; --dark: #1A1A1A; --muted: #888; --border: rgba(0,0,0,0.09); --card: #fff; }
  .app { max-width: 1280px; margin: 0 auto; padding: 20px 16px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
  .header-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .header-title span { color: var(--gold); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }
  button { cursor: pointer; font-family: inherit; font-size: 13px; }
  .btn-primary { background: var(--gold); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-weight: 500; }
  .btn-primary:hover { background: #b8943d; }
  .btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); border-radius: 8px; padding: 9px 16px; font-weight: 500; }
  .btn-ghost { background: none; border: 0.5px solid var(--border); border-radius: 7px; padding: 8px 14px; color: var(--muted); }
  .btn-danger { background: none; border: 0.5px solid #F5CACA; color: #A32D2D; border-radius: 7px; padding: 7px 14px; font-size: 12px; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 500; }
  .main { display: grid; gap: 14px; }
  .main.split { grid-template-columns: 320px 1fr; }
  input, select, textarea { font-family: inherit; font-size: 13px; padding: 8px 12px; border: 0.5px solid rgba(0,0,0,0.13); border-radius: 7px; background: #FAFAFA; color: var(--dark); outline: none; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }

  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 13px 15px; cursor: pointer; margin-bottom: 7px; }
  .card:hover { border-color: rgba(201,168,76,0.4); }
  .card.selected { background: #FFFBF0; border: 1.5px solid var(--gold); }
  .badge { border-radius: 4px; font-size: 11px; padding: 2px 7px; font-weight: 500; white-space: nowrap; }
  .tag { border-radius: 4px; font-size: 11px; padding: 2px 7px; display: inline-flex; align-items: center; gap: 4px; background: rgba(201,168,76,0.12); color: var(--gold); border: 0.5px solid rgba(201,168,76,0.3); }
  .tag .remove { cursor: pointer; opacity: 0.6; font-size: 10px; }
  .tags { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .badges { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }

  .sec-title { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; border-bottom: 0.5px solid rgba(201,168,76,0.3); padding-bottom: 4px; margin-top: 16px; }
  .drow { display: flex; gap: 10px; margin-bottom: 5px; font-size: 13px; }

  .modal-title { font-size: 17px; font-weight: 500; }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--muted); line-height: 1; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .frow { margin-bottom: 12px; }

  .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .tag-input-row { display: flex; gap: 6px; margin-bottom: 5px; }
  .tag-input-row input { flex: 1; }
  .tag-input-row button { padding: 8px 12px; background: var(--gold); color: #fff; border: none; border-radius: 7px; flex-shrink: 0; }

  .tag-sugs { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

  .ok-box { background: #F0FFF4; border: 0.5px solid #9FE1CB; border-radius: 9px; padding: 13px 16px; margin-bottom: 16px; font-size: 13px; color: #1A6B3C; }
  .err-box { background: #FFF5F5; border: 0.5px solid #F5CACA; border-radius: 9px; padding: 14px 18px; margin-bottom: 16px; font-size: 13px; color: #A32D2D; }
  .list-scroll { overflow-y: auto; max-height: calc(100vh - 310px); }
  .filters { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .count { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .sync { font-size: 11px; margin-left: 6px; }
  .spinner { display: flex; gap: 5px; align-items: center; justify-content: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: p 1.1s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes p{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  @media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.main.split{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="spinner" style="padding:80px 0"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<script>
const SHEET_ID="1y_QNvwgMSRydeeY2etGJUBREn-kDNRd9MuxV9nlJ2wc";
const SC="contacten Hans en Jaap voor hotels en overig";
const SO="Objecten";
const CH=["id","name","alias","email","phone","company","linkedinFirstDegree","locations","type","roomRange","starMin","budget","notes","operator","status","lastContact","source"];
const OH=["id","name","type","stars","location","price","rooms","size","status","description","matchCriteria","addedDate","source"];
const STATS=["Lead","Actief","In onderhandeling","Gesloten","Inactief"];
const OSTATS=["Beschikbaar","In analyse","In onderhandeling","Gesloten","Inactief"];
const STARS=["","1 ster","2 sterren","3 sterren","4 sterren","5 sterren","Niet van toepassing"];
const OTYPES=["Hotel","Boutique hotel","Resort","Aparthotel","Portfolio","Development","Nursing home","Mixed use","Kantoor","Retail","Wonen","Overig"];
const LOCS=["Madrid","Barcelona","Valencia","Alicante","Málaga","Sevilla","Marbella","Costa del Sol","Costa Blanca","Ibiza","Mallorca","Portugal","Duitsland","Nederland","België","Frankrijk"];
const AC=["#C9A84C","#1A4A7A","#1A6B3C","#7A3A1A","#4A1A7A","#1A6B6B"];
const SC2={"Lead":"#E67E22","Actief":"#1A6B3C","In onderhandeling":"#1A4A7A","Gesloten":"#7A3A1A","Inactief":"#888"};
const OC={"Beschikbaar":"#1A6B3C","In analyse":"#1A4A7A","In onderhandeling":"#E67E22","Gesloten":"#7A3A1A","Inactief":"#888"};

let S={contacts:[],objects:[],tab:"kopers",selC:null,selO:null,fTxt:"",fStat:"Alle",fLI:false,ofTxt:"",ofStat:"Alle",sync:"loading",syncErr:"",showCF:false,editC:null,showOF:false,editO:null,showSearch:false,showPdf:false};
let CF={},OF={},pdfState={loading:false,extracted:null,error:"",fname:""};
let SS={loc:"",type:"",rooms:"",budget:"",extra:"",loading:false,results:null,error:""};

async function api(b){const r=await fetch("/.netlify/functions/sheets",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();}

function r2c(r){if(!r||!r[1])return null;return{id:r[0]||"",name:r[1]||"",alias:r[2]||"",email:r[3]||"",phone:r[4]||"",company:r[5]||"",linkedinFirstDegree:r[6]==="true",locations:r[7]?r[7].split("|"):[],type:r[8]?r[8].split("|"):[],roomRange:r[9]||"",starMin:r[10]||"",budget:r[11]||"",notes:r[12]||"",operator:r[13]==="true",status:r[14]||"Lead",lastContact:r[15]||"",source:r[16]||""};}
function c2r(c){return[String(c.id),c.name,c.alias||"",c.email||"",c.phone||"",c.company||"",String(c.linkedinFirstDegree),(c.locations||[]).join("|"),(c.type||[]).join("|"),c.roomRange||"",c.starMin||"",c.budget||"",c.notes||"",String(c.operator),c.status,c.lastContact||"",c.source||""];}
function r2o(r){if(!r||!r[1])return null;return{id:r[0]||"",name:r[1]||"",type:r[2]||"",stars:r[3]||"",location:r[4]||"",price:r[5]||"",rooms:r[6]||"",size:r[7]||"",status:r[8]||"Beschikbaar",description:r[9]||"",matchCriteria:r[10]||"",addedDate:r[11]||"",source:r[12]||""};}
function o2r(o){return[String(o.id),o.name||"",o.type||"",o.stars||"",o.location||"",o.price||"",o.rooms||"",o.size||"",o.status||"Beschikbaar",o.description||"",o.matchCriteria||"",o.addedDate||"",o.source||""];}

function set(u){Object.assign(S,u);}

async function init(){
  set({sync:"loading"});
  try{
    const info=await api({action:"sheetinfo"});
    const sheets=(info.sheets||[]).map(s=>s.properties.title);
    if(!sheets.includes(SC))throw new Error(`Tabblad "${SC}" niet gevonden.`);
    if(!sheets.includes(SO)){await api({action:"append",range:SO,values:[OH]});}
    await Promise.all([loadC(),loadO()]);
    set({sync:"synced"});
  }catch(e){set({sync:"error",syncErr:e.message});}
  render();
}

async function loadC(){const d=await api({action:"get",range:`${SC}!A2:P10000`});S.contacts=(d.values||[]).map(r2c).filter(Boolean).filter(c=>c.name);}
async function loadO(){try{const d=await api({action:"get",range:`${SO}!A2:L1000`});S.objects=(d.values||[]).map(r2o).filter(Boolean).filter(o=>o.name);}catch(e){S.objects=[];}}
async function reload(){set({sync:"loading"});render();try{await Promise.all([loadC(),loadO()]);set({sync:"synced"});}catch(e){set({sync:"error",syncErr:e.message});}render();}

async function saveC(form){
  set({sync:"saving"});render();
  try{
    const d=await api({action:"get",range:`${SC}!A2:A10000`});
    const rows=d.values||[];
    const idx=rows.findIndex(r=>r[0]===String(form.id));
    if(idx>=0)await api({action:"update",range:`${SC}!A${idx+2}:P${idx+2}`,values:[c2r(form)]});
    else await api({action:"append",range:SC,values:[c2r(form)]});
    await loadC();
    set({selC:form,showCF:false,editC:null,sync:"synced"});
  }catch(e){set({sync:"error",syncErr:e.message});}
  render();
}

async function delC(id){
  if(!confirm("Contact verwijderen?"))return;
  set({sync:"saving"});render();
  try{
    const d=await api({action:"get",range:`${SC}!A2:P10000`});
    const rows=(d.values||[]).filter(r=>r[0]!==String(id));
    await api({action:"clear",range:`${SC}!A2:P10000`});
    if(rows.length>0)await api({action:"update",range:`${SC}!A2:P${rows.length+1}`,values:rows});
    await loadC();set({selC:null,sync:"synced"});
  }catch(e){set({sync:"error",syncErr:e.message});}
  render();
}

async function saveO(form){
  set({sync:"saving"});render();
  try{
    const d=await api({action:"get",range:`${SO}!A2:A1000`});
    const rows=d.values||[];
    const idx=rows.findIndex(r=>r[0]===String(form.id));
    if(idx>=0)await api({action:"update",range:`${SO}!A${idx+2}:L${idx+2}`,values:[o2r(form)]});
    else await api({action:"append",range:SO,values:[o2r(form)]});
    await loadO();
    set({selO:form,showOF:false,editO:null,showPdf:false,sync:"synced"});
  }catch(e){set({sync:"error",syncErr:e.message});}
  render();
}

async function delO(id){
  if(!confirm("Object verwijderen?"))return;
  set({sync:"saving"});render();
  try{
    const d=await api({action:"get",range:`${SO}!A2:L1000`});
    const rows=(d.values||[]).filter(r=>r[0]!==String(id));
    await api({action:"clear",range:`${SO}!A2:L1000`});
    if(rows.length>0)await api({action:"update",range:`${SO}!A2:L${rows.length+1}`,values:rows});
    await loadO();set({selO:null,sync:"synced"});
  }catch(e){set({sync:"error",syncErr:e.message});}
  render();
}

function matches(o){
  if(!o)return[];
  const loc=(o.location||"").toLowerCase();
  const typ=(o.type||"").toLowerCase();
  const kws=(o.matchCriteria||"").toLowerCase().split(",").map(k=>k.trim()).filter(Boolean);
  return S.contacts.filter(c=>{
    const lm=c.locations.some(l=>loc.includes(l.toLowerCase())||l.toLowerCase().split(",").some(lp=>loc.includes(lp.trim())));
    const tm=c.type.some(t=>typ.includes(t.toLowerCase())||t.toLowerCase().includes(typ.split(" ")[0]));
    const km=kws.some(k=>c.locations.some(l=>l.toLowerCase().includes(k))||c.type.some(t=>t.toLowerCase().includes(k)));
    const sm=!c.starMin||!o.stars||o.stars>=c.starMin;
    return (lm||tm||km)&&sm;
  }).slice(0,25);
}

async function handlePDF(input){
  const file=input.files[0];if(!file)return;
  pdfState={loading:true,extracted:null,error:"",fname:file.name};
  set({showPdf:true});render();
  try{
    if(file.size>30*1024*1024)throw new Error(`PDF te groot (${(file.size/1024/1024).toFixed(1)}MB). Max 30MB.`);
    // Read as base64
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>{try{res(r.result.split(",")[1]);}catch(e){rej(new Error("Leesfout"));}};
      r.onerror=()=>rej(new Error("Bestand kon niet worden gelezen"));
      r.readAsDataURL(file);
    });
    if(!b64||b64.length<100)throw new Error("PDF lijkt leeg of onleesbaar.");
    // Send to Netlify function (server-side) instead of directly to Anthropic
    const resp=await fetch("/.netlify/functions/sheets",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"extractpdf",pdfBase64:b64,filename:file.name})
    });
    const data=await resp.json();
    if(!resp.ok||data.error)throw new Error(data.error||`Fout ${resp.status}`);
    const ex=data.extracted;
    if(!ex||!ex.name)throw new Error("AI kon geen vastgoeddata vinden in dit document.");
    pdfState={loading:false,extracted:ex,error:"",fname:file.name};
    OF={id:String(Date.now()),name:ex.name||"",type:ex.type||"Hotel",stars:ex.stars||"",location:ex.location||"",price:ex.price||"",rooms:ex.rooms||"",size:ex.size||"",status:"Beschikbaar",description:ex.description||"",matchCriteria:ex.matchCriteria||"",addedDate:new Date().toISOString().split("T")[0],source:file.name};
  }catch(e){pdfState={loading:false,extracted:null,error:e.message,fname:file.name};}
  render();input.value="";}
async function handleLI(input){
  const file=input.files[0];if(!file)return;
  const text=await file.text();
  const lines=text.split('\n').map(l=>{l=l.replace(/;;+\s*$/,'').trim();if(l.startsWith('"')&&l.endsWith('"'))l=l.slice(1,-1).replace(/""/g,'"');return l;}).filter(l=>l.length>0);
  const hi=lines.findIndex(l=>l.toLowerCase().includes('first name'));
  if(hi===-1){alert('Geen geldige LinkedIn CSV.');input.value='';return;}
  const hdr=lines[hi].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  const fi=hdr.findIndex(h=>h.includes('first')),li=hdr.findIndex(h=>h.includes('last')),ci=hdr.findIndex(h=>h.includes('company')),pi=hdr.findIndex(h=>h.includes('position')),ei=hdr.findIndex(h=>h.includes('email'));
  function pcsv(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;}
  const en=S.contacts.map(c=>c.name.toLowerCase());
  const nc=[];let sk=0;
  for(const l of lines.slice(hi+1)){if(!l.trim())continue;const cols=pcsv(l);const f=(cols[fi]||'').replace(/^"|"$/g,'').trim(),la=(cols[li]||'').replace(/^"|"$/g,'').trim(),n=(f+' '+la).trim();if(!n||n.length<2){sk++;continue;}if(en.includes(n.toLowerCase())){sk++;continue;}const co=ci>=0?(cols[ci]||'').replace(/^"|"$/g,'').trim():'',po=pi>=0?(cols[pi]||'').replace(/^"|"$/g,'').trim():'',em=ei>=0?(cols[ei]||'').replace(/^"|"$/g,'').trim():'';nc.push({id:String(Date.now()+nc.length),name:n,alias:'',email:em,phone:'',company:co,linkedinFirstDegree:true,locations:[],type:[],roomRange:'',budget:'',notes:po?`Functie: ${po}`:'',operator:false,status:'Lead',lastContact:new Date().toISOString().split('T')[0],source:'LinkedIn'});en.push(n.toLowerCase());}
  if(nc.length===0){alert(`Geen nieuwe contacten.\n${sk} overgeslagen.`);input.value='';return;}
  if(!confirm(`${nc.length} nieuwe LinkedIn connecties importeren?\n(${sk} overgeslagen)`)){input.value='';return;}
  set({sync:'saving'});render();
  try{const B=100;for(let i=0;i<nc.length;i+=B){await api({action:'append',range:SC,values:nc.slice(i,i+B).map(c2r)});}await loadC();set({sync:'synced'});alert(`Klaar! ${nc.length} geïmporteerd.`);}
  catch(e){set({sync:'error',syncErr:e.message});}
  render();input.value='';
}

async function runSearch(){
  if(!SS.loc&&!SS.type)return;
  SS.loading=true;SS.results=null;SS.error="";render();
  const cr=[SS.loc&&`Locatie: ${SS.loc}`,SS.type&&`Type: ${SS.type}`,SS.rooms&&`Kamers: ${SS.rooms}`,SS.budget&&`Budget: ${SS.budget}`,SS.extra&&`Extra: ${SS.extra}`].filter(Boolean).join(", ");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],system:`Dealflow-assistent Costa Capital. Zoek ECHTE RECENTE kopers/investeerders voor vastgoed. JSON array alleen:\n[{"name":"Naam","company":"Org","deal_type":"Type","activity":"Recent gedaan","why_match":"Waarom match","linkedin_likely":true,"source":"Bron"}]\n4-8 resultaten.`,messages:[{role:"user",content:`Kopers voor: ${cr}`}]})});
    const d=await res.json();const t=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    const m=t.match(/\[[\s\S]*\]/);
    if(m){try{SS.results=JSON.parse(m[0]);}catch{SS.results=[];SS.error="Parse fout.";}}else{SS.results=[];SS.error="Geen resultaten.";}
  }catch(e){SS.error="Fout: "+e.message;}
  SS.loading=false;render();
}

function av(name,sz=38){const i=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();return `<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*0.34)}px;background:${AC[name.charCodeAt(0)%AC.length]};">${i}</div>`;}
function bdg(t,c){return `<span class="badge" style="background:${c}18;color:${c};border:0.5px solid ${c}40;">${t}</span>`;}
function tg(t,rm=false,f=""){return `<span class="tag">${t}${rm?`<span class="remove" onclick="rmTag('${f}','${t.replace(/'/g,"\\'")}')">✕</span>`:""}</span>`;}
function syncH(){const m={loading:["#888","Laden..."],saving:["#C9A84C","Opslaan..."],synced:["#1A6B3C","✓ Gesynchroniseerd"],error:["#A32D2D","Fout"]};const v=m[S.sync];return v?`<span class="sync" style="color:${v[0]}">${v[1]}</span>`+"":" ";}

function rmTag(f,v){if(CF[f])CF[f]=CF[f].filter(x=>x!==v);render();}
function addTag(f,v){const val=v||(document.getElementById(f+'In')?document.getElementById(f+'In').value.trim():"");if(val&&CF[f]&&!CF[f].includes(val)){CF[f].push(val);if(!v&&document.getElementById(f+'In'))document.getElementById(f+'In').value="";}render();}

function openCF(c){CF=c?JSON.parse(JSON.stringify(c)):{id:String(Date.now()),name:"",alias:"",email:"",phone:"",company:"",linkedinFirstDegree:false,locations:[],type:[],roomRange:"",starMin:"",budget:"",notes:"",operator:false,status:"Lead",lastContact:new Date().toISOString().split("T")[0],source:"Direct"};set({editC:c,showCF:true});render();}
function openOF(o){OF=o?JSON.parse(JSON.stringify(o)):{id:String(Date.now()),name:"",type:"Hotel",stars:"",location:"",price:"",rooms:"",size:"",status:"Beschikbaar",description:"",matchCriteria:"",addedDate:new Date().toISOString().split("T")[0],source:""};set({editO:o,showOF:true,showPdf:false});render();}

function render(){
  const app=document.getElementById("app");
  if(S.sync==="loading"&&S.contacts.length===0&&S.objects.length===0){app.innerHTML=`<div class="spinner" style="padding:80px 0"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="text-align:center;font-size:13px;color:var(--muted);margin-top:12px">Verbinden met Google Sheets...</div>`;return;}

  const hdr=`<div class="header"><div><div class="header-title"><span>Costa Capital</span> — Deal Platform</div><div class="header-sub">Hotel & vastgoed · Spanje & West-Europa ${syncH()} ${S.sync==="synced"?`<a href="#" onclick="reload();return false;" style="font-size:11px;color:var(--muted)">vernieuwen</a>`:""}</div></div>
  <div class="header-actions">${S.tab==="kopers"?`<label class="btn-ghost" style="cursor:pointer;display:inline-flex;align-items:center;">LinkedIn import<input type="file" accept=".csv" style="display:none" onchange="handleLI(this)"></label><button class="btn-outline" onclick="set({showSearch:true});render()">Zoek kopers</button><button class="btn-primary" onclick="openCF(null)">+ Contact</button>`:`<label class="btn-outline" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;">📄 PDF importeren<input type="file" accept=".pdf" style="display:none" onchange="handlePDF(this)"></label><span style="font-size:11px;color:var(--muted);margin-left:4px;">max 20MB</span><button class="btn-primary" onclick="openOF(null)">+ Object</button>`}</div></div>
  <div class="tabs"><button class="tab ${S.tab==="kopers"?"active":""}" onclick="set({tab:'kopers',selO:null});render()">Kopers (${S.contacts.length})</button><button class="tab ${S.tab==="objecten"?"active":""}" onclick="set({tab:'objecten',selC:null});render()">Objecten (${S.objects.length})</button></div>`;

  const errBox=S.sync==="error"?`<div class="err-box"><strong>Verbindingsfout</strong> — ${S.syncErr}<br><small>Controleer of Google Sheet gedeeld is als "Iedereen met link kan bewerken".</small><button class="btn-primary" style="margin-top:8px;font-size:12px" onclick="init()">Opnieuw</button></div>`:"";

  const modals=(S.showSearch?mSearch():"")+(S.showPdf?mPdf():"")+(S.showCF||S.editC?mCF():"")+(S.showOF||S.editO?mOF():"");

  app.innerHTML=hdr+errBox+(S.tab==="kopers"?tabK():tabO())+modals;
}

      <div class="tags" style="margin-bottom:6px;">${(f.locations||[]).map(l=>tg(l,true,"locations")).join("")}</div>
      <div class="tag-input-row"><input id="locationsIn" placeholder="Locatie + Enter" onkeydown="if(event.key==='Enter'){addTag('locations');event.preventDefault();}"><button onclick="addTag('locations')">+</button></div>
      <div class="tag-sugs">${LOCS.filter(l=>!(f.locations||[]).includes(l)).map(l=>`<button class="tag-sug" onclick="addTag('locations','${l}')">${l}</button>`).join("")}</div>
    </div>
    <div class="frow" style="margin-top:10px;"><div class="flabel">Notities</div><textarea rows="3" oninput="CF.notes=this.value">${f.notes||""}</textarea></div>
    <div class="modal-footer"><button class="btn-ghost" onclick="set({showCF:false,editC:null});render();">Annuleren</button><button class="btn-primary" onclick="saveC(CF)">Opslaan</button></div>
  </div></div>`;}

function mSearch(){
  const ss=SS;
  return `<div class="overlay" onclick="if(event.target===this){set({showSearch:false});render();}"><div class="modal modal-wide" onclick="event.stopPropagation()">
    <div class="modal-hdr"><div><div class="modal-title">Live Koper Zoeker</div><div style="font-size:12px;color:var(--muted);margin-top:3px;">AI zoekt live op internet naar beslissers</div></div><button class="modal-close" onclick="set({showSearch:false});render();">✕</button></div>
    <div class="fgrid"><div><div class="flabel">Locatie *</div><input value="${ss.loc}" placeholder="bijv. Valencia" oninput="SS.loc=this.value"></div><div><div class="flabel">Type *</div><input value="${ss.type}" placeholder="bijv. Boutique hotel" oninput="SS.type=this.value"></div><div><div class="flabel">Kamers</div><input value="${ss.rooms}" placeholder="bijv. 30-60" oninput="SS.rooms=this.value"></div><div><div class="flabel">Budget</div><input value="${ss.budget}" placeholder="bijv. €3M - €8M" oninput="SS.budget=this.value"></div></div>
    <div class="frow"><div class="flabel">Extra</div><input value="${ss.extra}" placeholder="bijv. historisch pand, bestaande vergunning" oninput="SS.extra=this.value"></div>
    <button class="btn-primary" style="width:100%;padding:11px;margin:12px 0;font-size:14px;border-radius:9px;" onclick="runSearch()" ${ss.loading?"disabled":""}>
      ${ss.loading?"Zoeken op internet...":"Zoek live op internet →"}
    </button>
    ${ss.loading?`<div class="spinner" style="margin-bottom:16px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`:""}
    ${ss.error?`<div class="err-box">${ss.error}</div>`:""}
    ${ss.results&&ss.results.length>0?`<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">${ss.results.length} kopers gevonden</div>
    ${ss.results.map((r,i)=>{const inC=S.contacts.some(c=>c.name.toLowerCase().includes((r.name||"").toLowerCase().split(" ")[0]));return `<div style="background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;gap:10px;"><div style="flex:1;"><div style="font-weight:500;font-size:14px;margin-bottom:4px;">${r.name||""}</div>${r.company?`<div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${r.company}</div>`:""}<div class="badges">${r.linkedin_likely?bdg("Mogelijk LinkedIn","#0A66C2"):""}${inC?bdg("Al in CRM","#1A6B3C"):""}${r.deal_type?bdg(r.deal_type,"#C9A84C"):""}</div>${r.activity?`<div style="font-size:12px;color:#444;line-height:1.6;margin-top:6px;">${r.activity}</div>`:""}</div>${!inC?`<button class="btn-primary" style="flex-shrink:0;align-self:flex-start;font-size:12px;padding:7px 12px;" onclick="saveC({id:String(Date.now()),name:'${(r.name||"").replace(/'/g,"\\'")}',alias:'',email:'',phone:'',company:'${(r.company||"").replace(/'/g,"\\'")}',linkedinFirstDegree:false,locations:['${ss.loc}'],type:['${ss.type}'],roomRange:'${ss.rooms}',budget:'${ss.budget}',notes:'${(r.activity||"").replace(/'/g,"\\'")}',operator:false,status:'Lead',lastContact:'${new Date().toISOString().split("T")[0]}',source:'AI Zoeker'})">+ Toevoegen</button>`:""}
    </div></div>`;}).join("")}`:""}
  </div></div>`;}

render();
init().then(()=>render());
</script>
</body>
</html>
