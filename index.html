<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costa Capital — Deal Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F6F1; color: #1A1A1A; font-size: 14px; }
  :root { --gold: #C9A84C; --dark: #1A1A1A; --muted: #888; --border: rgba(0,0,0,0.09); --card: #fff; }
  .app { max-width: 1280px; margin: 0 auto; padding: 20px 16px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
  .header-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .header-title span { color: var(--gold); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }
  button { cursor: pointer; font-family: inherit; font-size: 13px; }
  .btn-primary { background: var(--gold); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-weight: 500; }
  .btn-primary:hover { background: #b8943d; }
  .btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); border-radius: 8px; padding: 9px 16px; font-weight: 500; }
  .btn-ghost { background: none; border: 0.5px solid var(--border); border-radius: 7px; padding: 8px 14px; color: var(--muted); }
  .btn-danger { background: none; border: 0.5px solid #F5CACA; color: #A32D2D; border-radius: 7px; padding: 7px 14px; font-size: 12px; }
  .btn-success { background: #1A6B3C; color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 500; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 500; }
  .main { display: grid; gap: 14px; }
  .main.split { grid-template-columns: 340px 1fr; }
  input, select, textarea { font-family: inherit; font-size: 13px; padding: 8px 12px; border: 0.5px solid rgba(0,0,0,0.13); border-radius: 7px; background: #FAFAFA; color: var(--dark); outline: none; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 13px 15px; cursor: pointer; margin-bottom: 7px; }
  .card:hover { border-color: rgba(201,168,76,0.4); }
  .card.selected { background: #FFFBF0; border: 1.5px solid var(--gold); }
  .badge { border-radius: 4px; font-size: 11px; padding: 2px 7px; font-weight: 500; white-space: nowrap; }
  .avatar { border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 500; flex-shrink: 0; }
  .detail { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 22px; overflow-y: auto; max-height: calc(100vh - 160px); }
  .sec-title { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; border-bottom: 0.5px solid rgba(201,168,76,0.3); padding-bottom: 4px; margin-top: 16px; }
  .drow { display: flex; gap: 10px; margin-bottom: 5px; font-size: 13px; }
  .dlabel { color: var(--muted); min-width: 130px; flex-shrink: 0; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #fff; border-radius: 14px; padding: 28px; width: min(640px, 95vw); max-height: 90vh; overflow-y: auto; border: 1px solid rgba(201,168,76,0.4); }
  .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 17px; font-weight: 500; }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--muted); line-height: 1; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .frow { margin-bottom: 12px; }
  .flabel { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .match-card { background: #F8F6F1; border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .ok-box { background: #F0FFF4; border: 0.5px solid #9FE1CB; border-radius: 9px; padding: 13px 16px; margin-bottom: 16px; font-size: 13px; color: #1A6B3C; }
  .err-box { background: #FFF5F5; border: 0.5px solid #F5CACA; border-radius: 9px; padding: 14px 18px; margin-bottom: 16px; font-size: 13px; color: #A32D2D; }
  .list-scroll { overflow-y: auto; max-height: calc(100vh - 310px); }
  .filters { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .count { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .sync { font-size: 11px; margin-left: 6px; }
  .spinner { display: flex; gap: 5px; align-items: center; justify-content: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: p 1.1s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes p{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  @media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.main.split{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="spinner" style="padding:80px 0"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<script>
const SHEET_ID = "1y_QNvwgMSRydeeY2etGJUBREn-kDNRd9MuxV9nlJ2wc";
const SK = "Kopers en Operators";
const SO = "Objecten";
const KH = ["id","naam","bedrijf","email","telefoon","type","locaties","budget","zoekcriteria","notities","status","bron","toegevoegd"];
const OH = ["id","naam","type","sterren","locatie","prijs","kamers","oppervlakte","status","beschrijving","matchCriteria","toegevoegd","bron"];
const KTYPES = ["Koper","Operator","Investeerder","Fonds","Family Office","Ontwikkelaar","Overig"];
const OSTATS = ["Beschikbaar","In analyse","In onderhandeling","Gesloten","Inactief"];
const OTYPES = ["Hotel","Boutique hotel","Resort","Aparthotel","Portfolio","Development","Nursing home","Mixed use","Overig"];
const KSTATS = ["Lead","Actief","In onderhandeling","Gesloten","Inactief"];
const AC = ["#C9A84C","#1A4A7A","#1A6B3C","#7A3A1A","#4A1A7A","#1A6B6B"];
const SC2 = {"Lead":"#E67E22","Actief":"#1A6B3C","In onderhandeling":"#1A4A7A","Gesloten":"#7A3A1A","Inactief":"#888"};
const OC = {"Beschikbaar":"#1A6B3C","In analyse":"#1A4A7A","In onderhandeling":"#E67E22","Gesloten":"#7A3A1A","Inactief":"#888"};

let S = {kopers:[], objecten:[], tab:"kopers", selK:null, selO:null, fTxt:"", fStat:"Alle", ofTxt:"", ofStat:"Alle", sync:"loading", syncErr:"", showKF:false, editK:null, showOF:false, editO:null, showPdfO:false, showPdfK:false, showSearch:false};
let KF = {}, OF = {};
let pdfO = {loading:false, extracted:null, error:"", fname:""};
let pdfK = {loading:false, extracted:null, error:"", fname:""};
let SS = {loc:"", type:"", budget:"", extra:"", loading:false, results:null, error:"", forObject:null};

function set(u){ Object.assign(S, u); }

async function api(b){
  const r = await fetch("/.netlify/functions/sheets", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(b)});
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

function r2k(r){ if(!r||!r[0]||r[0]==="id"||r[1]==="naam")return null; return {id:r[0]||"",naam:r[1]||"",bedrijf:r[2]||"",email:r[3]||"",telefoon:r[4]||"",type:r[5]||"",locaties:r[6]||"",budget:r[7]||"",zoekcriteria:r[8]||"",notities:r[9]||"",status:r[10]||"Lead",bron:r[11]||"",toegevoegd:r[12]||""}; }
function k2r(k){ return [k.id,k.naam,k.bedrijf||"",k.email||"",k.telefoon||"",k.type||"",k.locaties||"",k.budget||"",k.zoekcriteria||"",k.notities||"",k.status||"Lead",k.bron||"",k.toegevoegd||""]; }
function r2o(r){ if(!r||!r[1]||r[0]==="id"||r[1]==="naam")return null; return {id:r[0]||"",naam:r[1]||"",type:r[2]||"",sterren:r[3]||"",locatie:r[4]||"",prijs:r[5]||"",kamers:r[6]||"",oppervlakte:r[7]||"",status:r[8]||"Beschikbaar",beschrijving:r[9]||"",matchCriteria:r[10]||"",toegevoegd:r[11]||"",bron:r[12]||""}; }
function o2r(o){ return [o.id,o.naam||"",o.type||"",o.sterren||"",o.locatie||"",o.prijs||"",o.kamers||"",o.oppervlakte||"",o.status||"Beschikbaar",o.beschrijving||"",o.matchCriteria||"",o.toegevoegd||"",o.bron||""]; }

function today(){ return new Date().toISOString().split("T")[0]; }

async function init(){
  set({sync:"loading"});
  try {
    const info = await api({action:"sheetinfo"});
    const sheets = (info.sheets||[]).map(s=>s.properties.title);
    if (!sheets.includes(SK)) await api({action:"append", range:SK, values:[KH]});
    if (!sheets.includes(SO)) await api({action:"append", range:SO, values:[OH]});
    await Promise.all([loadK(), loadO()]);
    set({sync:"synced"});
  } catch(e){ set({sync:"error", syncErr:e.message}); }
  render();
}

async function loadK(){
  try {
    const h = await api({action:"get", range:`${SK}!A1:M1`});
    const hrow = (h.values&&h.values[0])||[];
    if (!hrow[0]||hrow[0]!=="id") await api({action:"update", range:`${SK}!A1:M1`, values:[KH]});
    const d = await api({action:"get", range:`${SK}!A2:M2000`});
    S.kopers = (d.values||[]).map(r2k).filter(Boolean).filter(k=>k.naam&&k.naam.trim().length>0&&k.id&&k.id.trim().length>0);
  } catch(e){ S.kopers=[]; }
}

async function loadO(){
  try {
    const h = await api({action:"get", range:`${SO}!A1:M1`});
    const hrow = (h.values&&h.values[0])||[];
    if (!hrow[0]||hrow[0]!=="id") await api({action:"update", range:`${SO}!A1:M1`, values:[OH]});
    const d = await api({action:"get", range:`${SO}!A2:M1000`});
    S.objecten = (d.values||[]).map(r2o).filter(Boolean).filter(o=>o.naam&&o.naam.trim().length>0&&o.id&&o.id.trim().length>0);
  } catch(e){ S.objecten=[]; }
}

async function reload(){ set({sync:"loading"}); render(); try{ await Promise.all([loadK(),loadO()]); set({sync:"synced"}); }catch(e){ set({sync:"error",syncErr:e.message}); } render(); }

async function saveK(form){
  set({sync:"saving"}); render();
  try {
    const d = await api({action:"get", range:`${SK}!A2:A2000`});
    const rows = d.values||[];
    const idx = rows.findIndex(r=>r[0]===String(form.id));
    if (idx>=0) await api({action:"update", range:`${SK}!A${idx+2}:M${idx+2}`, values:[k2r(form)]});
    else await api({action:"append", range:SK, values:[k2r(form)]});
    await loadK();
    set({selK:form, showKF:false, editK:null, showPdfK:false, sync:"synced"});
  } catch(e){ set({sync:"error", syncErr:e.message}); }
  render();
}

async function delK(id){
  if (!confirm("Koper verwijderen?")) return;
  set({sync:"saving"}); render();
  try {
    const d = await api({action:"get", range:`${SK}!A2:M2000`});
    const rows = (d.values||[]).filter(r=>r[0]!==String(id));
    await api({action:"clear", range:`${SK}!A2:M2000`});
    if (rows.length>0) await api({action:"update", range:`${SK}!A2:M${rows.length+1}`, values:rows});
    await loadK(); set({selK:null, sync:"synced"});
  } catch(e){ set({sync:"error", syncErr:e.message}); }
  render();
}

async function saveO(form){
  set({sync:"saving"}); render();
  try {
    const d = await api({action:"get", range:`${SO}!A2:A1000`});
    const rows = d.values||[];
    const idx = rows.findIndex(r=>r[0]===String(form.id));
    if (idx>=0) await api({action:"update", range:`${SO}!A${idx+2}:M${idx+2}`, values:[o2r(form)]});
    else await api({action:"append", range:SO, values:[o2r(form)]});
    await loadO();
    set({selO:form, showOF:false, editO:null, showPdfO:false, sync:"synced"});
  } catch(e){ set({sync:"error", syncErr:e.message}); alert("Fout: "+e.message); }
  render();
}

async function delO(id){
  if (!confirm("Object verwijderen?")) return;
  set({sync:"saving"}); render();
  try {
    const d = await api({action:"get", range:`${SO}!A2:M1000`});
    const rows = (d.values||[]).filter(r=>r[0]!==String(id));
    await api({action:"clear", range:`${SO}!A2:M1000`});
    if (rows.length>0) await api({action:"update", range:`${SO}!A2:M${rows.length+1}`, values:rows});
    await loadO(); set({selO:null, sync:"synced"});
  } catch(e){ set({sync:"error", syncErr:e.message}); }
  render();
}

function matches(o){
  if (!o) return [];
  const loc = (o.locatie||"").toLowerCase();
  const typ = (o.type||"").toLowerCase();
  return S.kopers.filter(k=>{
    const lm = (k.locaties||"").toLowerCase().split(",").some(l=>l.trim()&&loc.includes(l.trim()));
    const tm = (k.type||"").toLowerCase().split(",").some(t=>t.trim()&&(typ.includes(t.trim())||t.trim().includes(typ.split(" ")[0])));
    const zm = (k.zoekcriteria||"").toLowerCase().includes(typ.split(" ")[0]);
    return lm || tm || zm;
  }).slice(0,20);
}

async function readPDF(file){
  if (file.size>30*1024*1024) throw new Error("PDF te groot. Max 30MB.");
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>{ try{ res(r.result.split(",")[1]); }catch(e){ rej(e); } };
    r.onerror = ()=>rej(new Error("Leesfout"));
    r.readAsDataURL(file);
  });
}

async function handlePdfO(input){
  const file = input.files[0]; if (!file) return;
  pdfO = {loading:true, extracted:null, error:"", fname:file.name};
  set({showPdfO:true}); render();
  try {
    const b64 = await readPDF(file);
    const resp = await fetch("/.netlify/functions/sheets", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"extractpdf", pdfBase64:b64, filename:file.name})});
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    const ex = data.extracted;
    if (!ex||!ex.name) throw new Error("AI kon geen vastgoeddata vinden.");
    pdfO = {loading:false, extracted:ex, error:"", fname:file.name};
    OF = {id:String(Date.now()), naam:ex.name||"", type:ex.type||"Hotel", sterren:ex.stars||"", locatie:ex.location||"", prijs:ex.price||"", kamers:ex.rooms||"", oppervlakte:ex.size||"", status:"Beschikbaar", beschrijving:ex.description||"", matchCriteria:ex.matchCriteria||"", toegevoegd:today(), bron:file.name};
  } catch(e){ pdfO = {loading:false, extracted:null, error:e.message, fname:file.name}; }
  render(); input.value="";
}

async function handlePdfK(input){
  const file = input.files[0]; if (!file) return;
  pdfK = {loading:true, extracted:null, error:"", fname:file.name};
  set({showPdfK:true}); render();
  try {
    const b64 = await readPDF(file);
    const resp = await fetch("/.netlify/functions/sheets", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"extractkoper", pdfBase64:b64, filename:file.name})});
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    const ex = data.extracted;
    if (!ex||!ex.naam) throw new Error("AI kon geen koper/operator profiel vinden.");
    pdfK = {loading:false, extracted:ex, error:"", fname:file.name};
    KF = {id:String(Date.now()), naam:ex.naam||"", bedrijf:ex.bedrijf||"", email:ex.email||"", telefoon:ex.telefoon||"", type:ex.type||"Koper", locaties:ex.locaties||"", budget:ex.budget||"", zoekcriteria:ex.zoekcriteria||"", notities:ex.notities||"", status:"Lead", bron:file.name, toegevoegd:today()};
  } catch(e){ pdfK = {loading:false, extracted:null, error:e.message, fname:file.name}; }
  render(); input.value="";
}

async function runSearch(){
  if (!SS.loc&&!SS.type) return;
  SS.loading=true; SS.results=null; SS.error=""; render();
  const cr = [SS.loc&&`Locatie: ${SS.loc}`, SS.type&&`Type: ${SS.type}`, SS.budget&&`Budget: ${SS.budget}`, SS.extra&&`Extra: ${SS.extra}`].filter(Boolean).join(", ");
  try {
    const res = await fetch("/.netlify/functions/sheets", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"search", criteria:cr})});
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    SS.results = (d.results||[]).map(r=>({...r, _added:false}));
    if (!SS.results.length) SS.error = "Geen resultaten. Probeer bredere criteria.";
  } catch(e){ SS.error = "Fout: "+e.message; }
  SS.loading=false; render();
}

async function addFromSearch(naam, bedrijf, activiteit, loc, type, objectId){
  const obj = S.objecten.find(o=>o.id===objectId);
  const notitie = activiteit + (obj?`\n\n📌 Gevonden voor: ${obj.naam} (${obj.locatie}, ${obj.prijs})`:"");
  const koper = {id:String(Date.now()), naam, bedrijf:bedrijf||"", email:"", telefoon:"", type:type||"Koper", locaties:loc||"", budget:"", zoekcriteria:"", notities:notitie, status:"Lead", bron:"AI Zoeker", toegevoegd:today()};
  set({sync:"saving"}); render();
  try {
    await api({action:"append", range:SK, values:[k2r(koper)]});
    await loadK();
    set({sync:"synced"});
    if (SS.results) SS.results = SS.results.map(r=>r.name===naam?{...r,_added:true}:r);
  } catch(e){ set({sync:"error", syncErr:e.message}); }
  render();
}

function av(naam, sz=38){ const i=(naam||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); return `<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*0.34)}px;background:${AC[(naam||"").charCodeAt(0)%AC.length]};">${i}</div>`; }
function bdg(t,c){ return `<span class="badge" style="background:${c}18;color:${c};border:0.5px solid ${c}40;">${t}</span>`; }
function syncH(){ const m={loading:["#888","Laden..."],saving:["#C9A84C","Opslaan..."],synced:["#1A6B3C","✓ Gesynchroniseerd"],error:["#A32D2D","Fout"]}; const v=m[S.sync]; return v?`<span class="sync" style="color:${v[0]}">${v[1]}</span>`:""; }

function openKF(k){ KF=k?JSON.parse(JSON.stringify(k)):{id:String(Date.now()),naam:"",bedrijf:"",email:"",telefoon:"",type:"Koper",locaties:"",budget:"",zoekcriteria:"",notities:"",status:"Lead",bron:"Direct",toegevoegd:today()}; set({editK:k,showKF:true}); render(); }
function openOF(o){ OF=o?JSON.parse(JSON.stringify(o)):{id:String(Date.now()),naam:"",type:"Hotel",sterren:"",locatie:"",prijs:"",kamers:"",oppervlakte:"",status:"Beschikbaar",beschrijving:"",matchCriteria:"",toegevoegd:today(),bron:""}; set({editO:o,showOF:true,showPdfO:false}); render(); }

function render(){
  const app = document.getElementById("app");
  if (S.sync==="loading"&&!S.kopers.length&&!S.objecten.length){
    app.innerHTML=`<div class="spinner" style="padding:80px 0"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="text-align:center;color:var(--muted);font-size:13px;margin-top:12px">Verbinden met Google Sheets...</div>`;
    return;
  }
  const errBox = S.sync==="error" ? `<div class="err-box"><strong>Verbindingsfout</strong> — ${S.syncErr}<button class="btn-primary" style="margin-left:12px;font-size:12px" onclick="init()">Opnieuw</button></div>` : "";
  const hdr = `<div class="header">
    <div>
      <div class="header-title"><span>Costa Capital</span> — Deal Platform</div>
      <div class="header-sub">Hotel & vastgoed · Spanje & West-Europa ${syncH()} ${S.sync==="synced"?`<a href="#" onclick="reload();return false;" style="color:var(--muted);font-size:11px;margin-left:6px">vernieuwen</a>`:""}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${S.tab==="kopers"
        ? `<label class="btn-ghost" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;">📄 PDF koper<input type="file" accept=".pdf" style="display:none" onchange="handlePdfK(this)"></label>
           <button class="btn-outline" onclick="SS.forObject=null;set({showSearch:true});render()">🔍 AI Zoeker</button>
           <button class="btn-primary" onclick="openKF(null)">+ Koper/Operator</button>`
        : `<label class="btn-outline" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;">📄 PDF object<input type="file" accept=".pdf" style="display:none" onchange="handlePdfO(this)"></label>

    <div class="frow"><div class="flabel">Locaties</div><input value="${(KF.locaties||"").replace(/"/g,"&quot;")}" oninput="KF.locaties=this.value"></div>
    <div class="frow"><div class="flabel">Budget</div><input value="${(KF.budget||"").replace(/"/g,"&quot;")}" oninput="KF.budget=this.value"></div>
    <div class="frow"><div class="flabel">Zoekcriteria</div><textarea rows="2" oninput="KF.zoekcriteria=this.value">${KF.zoekcriteria||""}</textarea></div>
    <div class="frow"><div class="flabel">Notities</div><textarea rows="2" oninput="KF.notities=this.value">${KF.notities||""}</textarea></div>
    <div class="modal-footer"><button class="btn-ghost" onclick="set({showPdfK:false});render();">Annuleren</button><button class="btn-primary" onclick="saveK(KF)">Opslaan</button></div>`:""}
  </div></div>`; }

function mSearch(){
  const ss = SS;
  const objLabel = ss.forObject ? `<div style="background:#FFFBF0;border:0.5px solid rgba(201,168,76,0.4);border-radius:7px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#7A5C00;">📌 Zoeken voor: <strong>${ss.forObject.naam}</strong></div>` : "";
  return `<div class="overlay" onclick="if(event.target===this){set({showSearch:false});render();}"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr"><div><div class="modal-title">AI Zoeker</div><div style="font-size:12px;color:var(--muted);margin-top:3px;">Zoekt live op internet naar kopers, operators en investeerders</div></div><button class="modal-close" onclick="set({showSearch:false});render();">✕</button></div>
    ${objLabel}
    <div class="fgrid">
      <div><div class="flabel">Locatie</div><input value="${ss.loc}" placeholder="bijv. Spanje, Marbella" oninput="SS.loc=this.value"></div>
      <div><div class="flabel">Type vastgoed</div><input value="${ss.type}" placeholder="bijv. Boutique hotel" oninput="SS.type=this.value"></div>
    </div>
    <div class="frow"><div class="flabel">Budget range</div><input value="${ss.budget}" placeholder="bijv. €5M - €20M" oninput="SS.budget=this.value"></div>
    <div class="frow"><div class="flabel">Extra zoektermen</div><input value="${ss.extra}" placeholder="bijv. recent actief, family office" oninput="SS.extra=this.value"></div>
    <button class="btn-primary" style="width:100%;padding:11px;margin:12px 0;font-size:14px;" onclick="runSearch()" ${ss.loading?"disabled":""}>
      ${ss.loading?"Zoeken...":"Zoek live op internet →"}
    </button>
    ${ss.loading?`<div class="spinner"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`:""}
    ${ss.error?`<div class="err-box">${ss.error}</div>`:""}
    ${ss.results&&ss.results.length?`<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">${ss.results.length} resultaten gevonden</div>
    ${ss.results.map(r=>{
      const inCRM = S.kopers.some(k=>k.naam.toLowerCase().includes((r.name||"").toLowerCase().split(" ")[0]));
      const added = r._added||inCRM;
      const objectId = ss.forObject?ss.forObject.id:null;
      const addBtn = added
        ? `<span style="font-size:11px;color:#1A6B3C;font-weight:500;">✓ In CRM</span>`
        : `<button class="btn-success" style="font-size:12px;" onclick="addFromSearch('${(r.name||"").replace(/'/g,"\\'")}','${(r.company||"").replace(/'/g,"\\'")}','${(r.activity||"").replace(/'/g,"\\'")}','${ss.loc}','${ss.type||"Koper"}','${objectId||""}')">+ Toevoegen</button>`;
      return `<div style="background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
          <div style="flex:1;">
            <div style="font-weight:500;font-size:14px;margin-bottom:3px;">${r.name||""}</div>
            ${r.company?`<div style="font-size:12px;color:var(--muted);margin-bottom:5px;">${r.company}</div>`:""}
            ${r.activity?`<div style="font-size:12px;color:#444;line-height:1.5;">${r.activity}</div>`:""}
            ${r.why_match?`<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;">${r.why_match}</div>`:""}
          </div>
          ${addBtn}
        </div>
      </div>`;
    }).join("")}`:""}
  </div></div>`; }

render();
init().then(()=>render());
</script>
</body>
</html>
